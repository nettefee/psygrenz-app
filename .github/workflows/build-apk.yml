name: PsyGrenz APK bauen

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Java einrichten
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Gradle einrichten
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.9'
      - name: PDF-Werkzeuge installieren
        run: sudo apt-get update && sudo apt-get install -y poppler-utils
      - name: Dokumentpaket aus GitHub-Release laden
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download documents --pattern pg-dokumente.zip --output pg-dokumente.zip
      - name: Dokumente vorbereiten
        run: |
          mkdir document-source
          unzip -q pg-dokumente.zip -d document-source
          python3 scripts/prepare_documents.py document-source app/src/main/assets
      - name: Signaturschlüssel vorbereiten
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "Fehler: Das GitHub-Secret ANDROID_KEYSTORE_BASE64 fehlt."
            exit 1
          fi
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/psygrenz-release.jks"
      - name: Signierte Release-APK bauen
        env:
          ANDROID_KEYSTORE_FILE: ${{ runner.temp }}/psygrenz-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle --no-daemon assembleRelease
      - name: APK eindeutig benennen
        run: mv app/build/outputs/apk/release/app-release.apk PsyGrenz-App-0.13.1.apk
      - name: Signierte APK bereitstellen
        uses: actions/upload-artifact@v4
        with:
          name: PsyGrenz-App-0.13.1-signiert
          path: PsyGrenz-App-0.13.1.apk
          retention-days: 30
